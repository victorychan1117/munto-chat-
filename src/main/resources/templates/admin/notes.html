<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투표 내역</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="card">
        <a th:href="@{'/admin/room/' + ${room.roomCode}}" class="back-link">&larr; 돌아가기</a>

        <h1 class="title">
            <span th:text="${participant != null ? participant.nickname : '알 수 없음'}">별칭</span>
            <span class="subtitle">님에게 투표한 사람</span>
        </h1>

        <div th:if="${#lists.isEmpty(notes)}" class="empty-state">
            아직 투표한 사람이 없습니다.
        </div>

        <div class="notes-list">
            <div th:each="note : ${notes}" class="note-card">
                <div class="note-header">
                    <span class="note-sender" th:text="${note.sender.nickname}">투표자</span>
                    <span class="note-time" th:text="${#temporals.format(note.createdAt, 'MM/dd HH:mm')}">시간</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
