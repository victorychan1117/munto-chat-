<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쪽지 작성</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="title">쪽지 작성</h1>
        <p class="subtitle">
            <strong th:text="${receiver.nickname}">받는 사람</strong> 님에게 보내는 익명 쪽지
        </p>

        <form th:action="@{'/room/' + ${room.roomCode} + '/send'}" method="post" class="form">
            <input type="hidden" name="nickname" th:value="${nickname}">
            <input type="hidden" name="receiverId" th:value="${receiver.id}">

            <div class="form-group">
                <label for="content">쪽지 내용</label>
                <textarea id="content" name="content" rows="6"
                          placeholder="마음을 담아 쪽지를 작성해보세요..." required maxlength="500"></textarea>
                <div class="char-count"><span id="charCount">0</span> / 500</div>
            </div>

            <button type="submit" class="btn btn-primary">쪽지 보내기</button>
        </form>

        <div class="bottom-actions">
            <a th:href="@{'/room/' + ${room.roomCode} + '/select?nickname=' + ${nickname}}" class="btn btn-outline">다른 사람 선택</a>
        </div>
    </div>
</div>

<script>
    const textarea = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    textarea.addEventListener('input', function() {
        charCount.textContent = this.value.length;
    });
</script>
</body>
</html>
