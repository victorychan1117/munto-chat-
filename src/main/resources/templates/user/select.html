<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투표하기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="title">인기투표</h1>
        <p class="subtitle">누구에게 투표할까요?</p>

        <div th:if="${#lists.isEmpty(candidates)}" class="empty-state">
            투표할 수 있는 참여자가 없습니다.
        </div>

        <div class="candidate-grid">
            <form th:each="c : ${candidates}"
                  th:action="@{'/room/' + ${room.roomCode} + '/vote'}"
                  method="post"
                  style="display:contents;">
                <input type="hidden" name="nickname" th:value="${nickname}">
                <input type="hidden" name="receiverId" th:value="${c.id}">
                <button type="submit" class="candidate-card" onclick="return confirm(this.querySelector('.candidate-name').textContent + '님에게 투표하시겠습니까?')">
                    <div class="candidate-avatar"
                         th:classappend="${c.gender != null ? (c.gender.name() == 'MALE' ? 'avatar-male' : 'avatar-female') : 'avatar-default'}">
                        <span th:text="${c.gender != null ? (c.gender.name() == 'MALE' ? '♂' : '♀') : '?'}">?</span>
                    </div>
                    <span class="candidate-name" th:text="${c.nickname}">별칭</span>
                </button>
            </form>
        </div>

        <div class="bottom-actions">
            <a th:href="@{'/room/' + ${room.roomCode}}" class="btn btn-outline">뒤로가기</a>
        </div>
    </div>
</div>
</body>
</html>
