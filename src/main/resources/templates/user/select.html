<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쪽지 보낼 사람 선택</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="title">쪽지 보내기</h1>
        <p class="subtitle">누구에게 쪽지를 보낼까요?</p>

        <div th:if="${#lists.isEmpty(candidates)}" class="empty-state">
            쪽지를 보낼 수 있는 참여자가 없습니다.
        </div>

        <div class="candidate-grid">
            <a th:each="c : ${candidates}"
               th:href="@{'/room/' + ${room.roomCode} + '/write?nickname=' + ${nickname} + '&receiverId=' + ${c.id}}"
               class="candidate-card">
                <div class="candidate-avatar"
                     th:classappend="${c.gender != null ? (c.gender.name() == 'MALE' ? 'avatar-male' : 'avatar-female') : 'avatar-default'}">
                    <span th:text="${c.gender != null ? (c.gender.name() == 'MALE' ? '♂' : '♀') : '?'}">?</span>
                </div>
                <span class="candidate-name" th:text="${c.nickname}">별칭</span>
            </a>
        </div>

        <div class="bottom-actions">
            <a th:href="@{'/room/' + ${room.roomCode}}" class="btn btn-outline">뒤로가기</a>
        </div>
    </div>
</div>
</body>
</html>
